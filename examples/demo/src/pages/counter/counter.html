<main class="page counter-page">
  <h1>Count: {{ count }}</h1>
  <p>This route uses the Redux-style Svengular store from a TypeScript component.</p>
  <div class="counter-actions" aria-label="Counter actions">
    <button type="button" data-on-click="decrement">Decrement</button>
    <button type="button" data-on-click="increment">Increment</button>
  </div>
</main>
